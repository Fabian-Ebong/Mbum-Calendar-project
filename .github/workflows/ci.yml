name: CI

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build_test:
    name: Build / Lint / Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint (if configured)
        run: npm run lint --if-present

      - name: Typecheck (if configured)
        run: npm run typecheck --if-present

      - name: Build
        run: npm run build
